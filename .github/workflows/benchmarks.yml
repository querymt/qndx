name: Performance Benchmarks

on:
  pull_request:
    branches: [main]
    paths:
      - 'crates/**'
      - 'benches/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/benchmarks.yml'
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for baseline comparison

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install Criterion dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gnuplot

      - name: Restore baseline from main branch
        if: github.event_name == 'pull_request'
        id: restore-baseline
        uses: actions/cache/restore@v3
        with:
          path: target/criterion
          key: benchmark-baseline-${{ github.base_ref }}-${{ hashFiles('benchmarks/budgets.toml') }}
          restore-keys: |
            benchmark-baseline-${{ github.base_ref }}-
            benchmark-baseline-main-

      - name: Run benchmarks (PR - with baseline comparison)
        if: github.event_name == 'pull_request' && steps.restore-baseline.outputs.cache-hit == 'true'
        run: |
          echo "::group::Running benchmarks against baseline"
          cargo bench --all-features -- --baseline main --output-format json | tee bench-output.json
          echo "::endgroup::"

      - name: Run benchmarks (PR - no baseline)
        if: github.event_name == 'pull_request' && steps.restore-baseline.outputs.cache-hit != 'true'
        run: |
          echo "::warning::No baseline found, running benchmarks without comparison"
          cargo bench --all-features -- --save-baseline pr-${{ github.event.pull_request.number }}

      - name: Run benchmarks (main branch - save as baseline)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "::group::Running benchmarks and saving as baseline"
          cargo bench --all-features -- --save-baseline main
          echo "::endgroup::"

      - name: Check performance budgets
        if: github.event_name == 'pull_request' && steps.restore-baseline.outputs.cache-hit == 'true'
        run: |
          echo "::group::Checking performance budgets"
          # TODO: Implement budget checker in qndx-cli
          # For now, manually parse Criterion output
          
          # Extract regression percentages from Criterion output
          if grep -q "Performance has regressed" bench-output.json; then
            echo "::error::Performance regression detected"
            echo "Review benchmark output above for details"
            exit 1
          fi
          
          if grep -q "change: \+[2-9][0-9]\.[0-9]\+%" bench-output.json; then
            echo "::error::Significant performance regression (>20%) detected"
            exit 1
          fi
          
          echo "::notice::Performance budgets check passed"
          echo "::endgroup::"

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: |
            target/criterion/
            bench-output.json
          retention-days: 90

      - name: Save baseline cache (main branch)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/cache/save@v3
        with:
          path: target/criterion
          key: benchmark-baseline-${{ github.ref_name }}-${{ hashFiles('benchmarks/budgets.toml') }}

      - name: Generate benchmark report
        if: github.event_name == 'pull_request'
        run: |
          echo "::group::Generating human-readable report"
          # TODO: Implement report generator in qndx-cli
          # cargo run -p qndx-cli -- bench report --format markdown > bench-report.md
          echo "Benchmark comparison complete. See artifacts for detailed results."
          echo "::endgroup::"

      - name: Comment PR with benchmark summary
        if: github.event_name == 'pull_request' && steps.restore-baseline.outputs.cache-hit == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // Try to read benchmark output
            let summary = '## Benchmark Results\n\n';
            summary += 'Benchmarks have been run against the main baseline.\n\n';
            summary += 'Download the full results from the workflow artifacts.\n\n';
            summary += '**Note**: Detailed budget checking is pending implementation of `qndx-cli bench check-budgets`.\n';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

  # Nightly comprehensive benchmark run for trend tracking
  nightly-benchmark:
    name: Nightly Comprehensive Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run all benchmarks with extended samples
        run: |
          cargo bench --all-features -- --sample-size 100 --save-baseline nightly-$(date +%Y%m%d)

      - name: Upload nightly results
        uses: actions/upload-artifact@v4
        with:
          name: nightly-benchmark-$(date +%Y%m%d)
          path: target/criterion/
          retention-days: 365

      - name: Store results in repository
        run: |
          mkdir -p benchmarks/results/nightly
          cp -r target/criterion/ benchmarks/results/nightly/$(date +%Y%m%d)/
          
          # Commit results (if we want to track in git)
          # git config user.name "GitHub Actions"
          # git config user.email "actions@github.com"
          # git add benchmarks/results/
          # git commit -m "Add nightly benchmark results for $(date +%Y-%m-%d)" || true
          # git push || true
