name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Parse tag version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ -z "$VERSION" || "$VERSION" == "$GITHUB_REF_NAME" ]]; then
            echo "Tag must be in form vX.Y.Z"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate workspace version matches tag
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          WORKSPACE_VERSION="$(awk '
            $0 == "[workspace.package]" { in_section = 1; next }
            /^\[/ && in_section { in_section = 0 }
            in_section && $1 == "version" {
              gsub(/"/, "", $3)
              print $3
              exit
            }
          ' Cargo.toml)"

          if [[ -z "$WORKSPACE_VERSION" ]]; then
            echo "Could not read workspace.package.version from Cargo.toml"
            exit 1
          fi

          if [[ "$WORKSPACE_VERSION" != "$VERSION" ]]; then
            echo "Tag version v$VERSION does not match workspace version $WORKSPACE_VERSION"
            exit 1
          fi

      - name: Validate changelog contains release entry
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          if ! grep -Fq "## [$VERSION] -" CHANGELOG.md; then
            echo "Missing CHANGELOG entry: ## [$VERSION] - YYYY-MM-DD"
            exit 1
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use_cross: true
            archive: tar.gz
            exe_suffix: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            use_cross: true
            archive: tar.gz
            exe_suffix: ""
          - os: macos-13
            target: x86_64-apple-darwin
            use_cross: false
            archive: tar.gz
            exe_suffix: ""
          - os: macos-14
            target: aarch64-apple-darwin
            use_cross: false
            archive: tar.gz
            exe_suffix: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            use_cross: false
            archive: zip
            exe_suffix: ".exe"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install cross
        if: matrix.use_cross
        shell: bash
        run: cargo install cross --locked

      - name: Build with cross (Linux musl)
        if: matrix.use_cross
        shell: bash
        run: cross build -p qndx-cli --release --target ${{ matrix.target }}

      - name: Build with cargo
        if: ${{ !matrix.use_cross }}
        shell: bash
        run: cargo build -p qndx-cli --release --target ${{ matrix.target }}

      - name: Package Unix artifact
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.verify.outputs.version }}"
          TARGET="${{ matrix.target }}"
          ASSET="qndx-v${VERSION}-${TARGET}.tar.gz"
          mkdir -p dist
          cp "target/${TARGET}/release/qndx" "dist/qndx"
          tar -C dist -czf "dist/${ASSET}" qndx
          rm -f dist/qndx

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ needs.verify.outputs.version }}"
          $target = "${{ matrix.target }}"
          $asset = "qndx-v$version-$target.zip"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/$target/release/qndx.exe" "dist/qndx.exe"
          Compress-Archive -Path "dist/qndx.exe" -DestinationPath "dist/$asset" -Force
          Remove-Item "dist/qndx.exe" -Force

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub release
    needs: [verify, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum qndx-v* > sha256sums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/*
          generate_release_notes: true
